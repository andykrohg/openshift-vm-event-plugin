# Audit webhook configuration for Kubernetes API server
# This configures the API server to send audit events to our processor
apiVersion: v1
kind: Config
clusters:
- name: vm-activity-audit
  cluster:
    server: https://vm-activity-api.vm-activity-plugin.svc:8443/api/v1/audit
    # Using OpenShift service-serving certificate
    # For strict verification in production, add certificate-authority bundle:
    # certificate-authority: /path/to/ca.crt
    insecure-skip-tls-verify: true
contexts:
- name: vm-activity-audit
  context:
    cluster: vm-activity-audit
    user: ""
current-context: vm-activity-audit
users: []
