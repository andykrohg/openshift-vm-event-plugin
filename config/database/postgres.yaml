---
apiVersion: v1
kind: Secret
metadata:
  name: vm-activity-db-secret
  namespace: vm-activity-plugin
type: Opaque
stringData:
  username: vmactivity
  password: changeme  # Change this in production!
  database: vmactivity
---
apiVersion: v1
kind: Service
metadata:
  name: vm-activity-db
  namespace: vm-activity-plugin
  labels:
    app: vm-activity-db
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: vm-activity-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vm-activity-db
  namespace: vm-activity-plugin
  labels:
    app: vm-activity-db
spec:
  serviceName: vm-activity-db
  replicas: 1
  selector:
    matchLabels:
      app: vm-activity-db
  template:
    metadata:
      labels:
        app: vm-activity-db
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: vm-activity-db-secret
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vm-activity-db-secret
                  key: password
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: vm-activity-db-secret
                  key: database
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - vmactivity
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - vmactivity
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
