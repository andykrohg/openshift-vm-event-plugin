apiVersion: batch/v1
kind: CronJob
metadata:
  name: vm-event-retention
  namespace: vm-event-operator-system
  labels:
    app.kubernetes.io/name: vm-event-retention
    app.kubernetes.io/component: cleanup
spec:
  schedule: "0 2 * * *"  # Run daily at 2am
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: vm-event-retention
        spec:
          serviceAccountName: vm-event-operator
          restartPolicy: OnFailure
          containers:
            - name: retention
              image: registry.redhat.io/rhel9/postgresql-16:latest
              env:
                - name: PGHOST
                  value: "vm-event-db"
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: vm-event-db-secret
                      key: database
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: vm-event-db-secret
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: vm-event-db-secret
                      key: password
                - name: RETENTION_DAYS
                  value: "30"
              command:
                - /bin/sh
                - -c
                - |
                  psql -c "DELETE FROM vm_events WHERE created_at < NOW() - INTERVAL '${RETENTION_DAYS} days';" && \
                  echo "Deleted events older than ${RETENTION_DAYS} days"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
