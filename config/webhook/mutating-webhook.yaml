apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: vm-activity-webhook
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
webhooks:
- name: vm-activity.openshift.io
  admissionReviewVersions: ["v1"]
  clientConfig:
    service:
      name: vm-activity-api
      namespace: vm-activity-plugin
      path: /mutate
      port: 8443
    # CABundle will be injected by OpenShift via the annotation above
  rules:
  - operations: ["CREATE", "UPDATE", "DELETE"]
    apiGroups: ["kubevirt.io"]
    apiVersions: ["v1"]
    resources: ["virtualmachines", "virtualmachineinstances"]
    scope: "Namespaced"
  - operations: ["CREATE", "DELETE"]
    apiGroups: ["snapshot.kubevirt.io"]
    apiVersions: ["v1beta1", "v1alpha1"]
    resources: ["virtualmachinesnapshots"]
    scope: "Namespaced"
  sideEffects: None
  timeoutSeconds: 5
  failurePolicy: Ignore
  namespaceSelector: {}
