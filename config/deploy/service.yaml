apiVersion: v1
kind: Service
metadata:
  name: vm-activity-api
  namespace: vm-activity-plugin
  labels:
    app: vm-activity-processor
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: vm-activity-api-cert
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
  selector:
    app: vm-activity-processor
