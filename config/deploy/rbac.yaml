---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-activity-processor
  namespace: vm-activity-plugin
  labels:
    app: vm-activity-processor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vm-activity-processor
  labels:
    app: vm-activity-processor
rules:
  # Watch Events across all namespaces
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

  # Read VirtualMachines and VirtualMachineInstances
  # (optional - for enrichment, not strictly required)
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances"]
    verbs: ["get", "list", "watch"]

  # Watch VirtualMachineSnapshots
  - apiGroups: ["snapshot.kubevirt.io"]
    resources: ["virtualmachinesnapshots"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vm-activity-processor
  labels:
    app: vm-activity-processor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vm-activity-processor
subjects:
  - kind: ServiceAccount
    name: vm-activity-processor
    namespace: vm-activity-plugin
